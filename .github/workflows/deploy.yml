name: Test and Push WindCore Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: windcoreregistry.azurecr.io
  IMAGE_NAME: windcore

jobs:
  test-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Test Python syntax
        run: |
          python -m py_compile main.py api_routes.py data_manager.py policies.py predictive_maintenance.py simulation_service.py

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build --no-cache -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: Test container starts
        run: |
          docker run -d -p 5000:5000 --name windcore-test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 15
          curl -f http://localhost:5000/health
          docker stop windcore-test
          docker rm windcore-test

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest